<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #607086;
      --glass: rgba(255, 255, 255, 0.78);
      --line: rgba(23, 32, 51, 0.14);
      --aqua: #00b8a9;
      --gold: #ffb703;
      --coral: #ef476f;
      --blue: #3a86ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 18%, rgba(0, 184, 169, 0.22), transparent 28%),
        radial-gradient(circle at 84% 14%, rgba(255, 183, 3, 0.26), transparent 28%),
        radial-gradient(circle at 72% 84%, rgba(239, 71, 111, 0.18), transparent 30%),
        linear-gradient(135deg, #f8fcff 0%, #edf6ff 48%, #fff5f8 100%);
    }

    main {
      position: relative;
      width: min(92vw, 760px);
      padding: clamp(2rem, 6vw, 4.8rem);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--glass);
      box-shadow: 0 28px 80px rgba(57, 79, 117, 0.18);
      backdrop-filter: blur(22px);
      text-align: center;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(120deg, var(--aqua), var(--blue), var(--coral), var(--gold));
      opacity: 0.48;
      filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.64);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .spark {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 50%;
      background: var(--aqua);
      box-shadow: 0 0 24px var(--aqua);
    }

    h1 {
      margin: 1.6rem 0 0.9rem;
      font-size: clamp(3rem, 12vw, 7.8rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--aqua), var(--gold), var(--coral));
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 560px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.9rem;
      margin-top: 2rem;
    }

    nav {
      position: fixed;
      top: 1rem;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 0.4rem;
      padding: 0.35rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }

    nav a {
      min-height: 0;
      border-radius: 999px;
      padding: 0.55rem 0.85rem;
      color: var(--muted);
      background: transparent;
      box-shadow: none;
      font-size: 0.9rem;
    }

    nav a[aria-current="page"] {
      color: #07111e;
      background: var(--aqua);
    }

    a,
    button {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      padding: 0.85rem 1.1rem;
      color: #07111e;
      background: var(--aqua);
      box-shadow: 0 12px 30px rgba(0, 184, 169, 0.22);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    button {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    a:hover,
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(0, 184, 169, 0.24);
    }

    body.party main {
      box-shadow:
        0 28px 80px rgba(57, 79, 117, 0.18),
        0 0 70px rgba(255, 183, 3, 0.22),
        0 0 90px rgba(239, 71, 111, 0.18);
    }

    body.party h1 span {
      background-image: linear-gradient(90deg, var(--gold), var(--coral), var(--aqua), var(--blue));
    }

    .orbit {
      position: absolute;
      width: 13rem;
      height: 13rem;
      border: 1px solid rgba(23, 32, 51, 0.15);
      border-radius: 50%;
      animation: spin 16s linear infinite;
    }

    .orbit::after {
      content: "";
      position: absolute;
      top: 1.2rem;
      left: 1.2rem;
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 24px var(--gold);
    }

    .orbit-left {
      left: -5rem;
      bottom: -5rem;
    }

    .orbit-right {
      top: -5.5rem;
      right: -5.5rem;
      animation-direction: reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(1turn);
      }
    }

    @media (max-width: 560px) {
      main {
        border-radius: 22px;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="hello-world.html" aria-current="page">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <main>
    <div class="orbit orbit-left"></div>
    <div class="orbit orbit-right"></div>
    <div class="badge"><span class="spark"></span>First page energy</div>
    <h1>Hello <span>World</span></h1>
    <p>A small, shiny HTML page with glassy depth, bright accents, and just enough motion to feel alive.</p>
    <div class="actions">
      <a href="about.html">About This Site</a>
      <button type="button" onclick="document.body.classList.toggle('party')">Make it sparkle</button>
    </div>
  </main>
  <script>
    document.querySelector("button").addEventListener("click", () => {
      document.querySelector(".spark").animate(
        [
          { transform: "scale(1)", opacity: 1 },
          { transform: "scale(2.8)", opacity: 0.3 },
          { transform: "scale(1)", opacity: 1 }
        ],
        { duration: 520, easing: "ease-out" }
      );
    });
  </script>
</body>
</html>
