<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #bac6d8;
      --glass: rgba(8, 18, 34, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --aqua: #36f1cd;
      --gold: #ffd166;
      --coral: #ff6f91;
      --blue: #54a0ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 111, 145, 0.20), transparent 26%),
        radial-gradient(circle at 82% 20%, rgba(54, 241, 205, 0.18), transparent 28%),
        radial-gradient(circle at 52% 92%, rgba(255, 209, 102, 0.16), transparent 28%),
        linear-gradient(135deg, #07111f 0%, #17182c 50%, #251429 100%);
    }

    nav {
      position: sticky;
      top: 1rem;
      z-index: 10;
      display: flex;
      width: max-content;
      max-width: calc(100% - 2rem);
      gap: 0.4rem;
      margin: 1rem auto 0;
      padding: 0.35rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(9, 18, 35, 0.72);
      backdrop-filter: blur(16px);
    }

    nav a,
    button {
      border: 0;
      border-radius: 999px;
      padding: 0.65rem 0.9rem;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease;
    }

    nav a:hover,
    button:hover {
      transform: translateY(-2px);
    }

    nav a[aria-current="page"],
    button {
      color: #07111e;
      background: var(--aqua);
    }

    main {
      width: min(1060px, calc(100% - 2rem));
      margin: 3rem auto;
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: clamp(1.4rem, 4vw, 3rem);
      align-items: start;
    }

    .intro,
    form {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--glass);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(22px);
    }

    .intro {
      padding: clamp(1.6rem, 4vw, 3rem);
      position: relative;
      overflow: hidden;
    }

    .intro::after {
      content: "";
      position: absolute;
      right: -5rem;
      bottom: -5rem;
      width: 14rem;
      height: 14rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(54, 241, 205, 0.18), transparent 66%);
    }

    .eyebrow {
      color: var(--aqua);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0.8rem 0 1rem;
      font-size: clamp(2.8rem, 7vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .contact-list {
      display: grid;
      gap: 0.8rem;
      margin-top: 2rem;
    }

    .contact-list a {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1rem;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.07);
      text-decoration: none;
    }

    .contact-list span {
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 1rem;
      padding: clamp(1.4rem, 4vw, 2.2rem);
    }

    label {
      display: grid;
      gap: 0.45rem;
      color: var(--ink);
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0.9rem 1rem;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      font: inherit;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--aqua);
      box-shadow: 0 0 0 4px rgba(54, 241, 205, 0.14);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button {
      min-height: 50px;
      justify-self: start;
      padding-inline: 1.2rem;
      box-shadow: 0 14px 34px rgba(54, 241, 205, 0.22);
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      nav {
        width: calc(100% - 2rem);
        justify-content: center;
      }

      nav a {
        flex: 1;
        padding-inline: 0.5rem;
        text-align: center;
      }

      .contact-list a {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="hello-world.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <main>
    <section class="intro" aria-labelledby="contact-title">
      <div class="eyebrow">Contact page</div>
      <h1 id="contact-title">Say Hello</h1>
      <p>Send a note about the page design, the About section, or anything else this tiny site has sparked.</p>
      <div class="contact-list">
        <a href="mailto:hello@example.com"><strong>Email</strong><span>hello@example.com</span></a>
        <a href="tel:+10000000000"><strong>Phone</strong><span>+1 000 000 0000</span></a>
      </div>
    </section>

    <form action="mailto:hello@example.com" method="post" enctype="text/plain">
      <label>
        Name
        <input name="name" type="text" placeholder="Your name" required>
      </label>
      <label>
        Email
        <input name="email" type="email" placeholder="you@example.com" required>
      </label>
      <label>
        Message
        <textarea name="message" placeholder="Write your message here" required></textarea>
      </label>
      <button type="submit">Send Message</button>
    </form>
  </main>
</body>
</html>
